<!DOCTYPE html>
<html>
<head>
  <title>Register | MindMaze</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #3b0a32, #1c0717);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    form {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 20px;
      width: 500px;
    }

    .form-floating input,
    .form-floating select {
      background-color: rgba(255, 255, 255, 0.1);
      color: rgb(229, 222, 222);
    }

    .form-floating label {
      color: #000000;
    }

    .form-control:focus {
      border-color: #fbff00;
      box-shadow: 0 0 10px #ffc10766;
      background-color: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .form-select option {
      background-color: #3b0a32;
      color: white;
    }

    .btn-success {
      border-radius: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <form action="#" method="post">
    <h3 class="text-center text-warning mb-4">Create Your Account</h3>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="username" placeholder="Enter your name" name="username" required>
      <label for="username">Username</label>
    </div>

    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email" required>
      <label for="email">E-mail</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="password" placeholder="Enter your password" name="password" required>
      <label for="password">Password</label>
      <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3" id="togglePassword" style="cursor: pointer;"></i>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="phone" placeholder="Phone number" name="phone" required>
      <label for="phone">Phone Number</label>
    </div>

    <div class="form-floating mb-3">
      <input type="date" class="form-control" id="dob" name="dob" required>
      <label for="dob">Date of Birth</label>
    </div>

 

    <div class="mb-4">
      <label for="profile" class="form-label text-light">Upload Profile Picture</label>
      <input class="form-control" type="file" id="profile" name="profile" required>
    </div>

    <button class="btn btn-success w-100 py-2" type="submit">
      <i class="bi bi-check-circle me-2"></i>Register
    </button>

    <div class="text-center mt-3">
      <span>Already have an account? </span>
      <a href="login.html" class="text-warning fw-bold text-decoration-none">Sign in here</a>
    </div>
    <div class="text-center mt-4">
  <p class="text-secondary mb-2">Or register with</p>
  <div class="d-flex justify-content-center gap-4 fs-4">
    <a href="#" class="text-light"><i class="bi bi-google"></i></a>
    <a href="#" class="text-light"><i class="bi bi-linkedin"></i></a>
    <a href="#" class="text-light"><i class="bi bi-facebook"></i></a>
  </div>
</div>
  </form>
</body>
</html>
