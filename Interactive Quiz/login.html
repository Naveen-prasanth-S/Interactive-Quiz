<!DOCTYPE html>
<html>
<head>
  <title>Login | MindMaze</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #3b0a32, #1c0717);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    form {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
    }

    .form-floating input {
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .form-floating label {
      color: #ccc;
    }

    .form-control:focus {
      border-color: #ffc107;
      box-shadow: 0 0 10px #ffc10766;
      background-color: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .btn-warning {
      border-radius: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <form action="home.html?auth=true" method="get">
    <h3 class="text-center text-warning mb-4">Welcome to MindMaze</h3>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="login-username" placeholder="Username or Email" name="username" required>
      <label for="login-username">Username or Email</label>
    </div>

    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="login-password" placeholder="Password" name="password" required>
      <label for="login-password">Password</label>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" value="" id="rememberMe">
      <label class="form-check-label" for="rememberMe">
        Remember me
      </label>
    </div>

    <!-- ✅ Only submits when fields are filled -->
    <button type="submit" class="btn btn-success w-100 py-2">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>

    <div class="text-center mt-3">
      <span>Don't have an account? </span>
      <a href="form.html" class="text-warning fw-bold text-decoration-none">Register</a>
    </div>
  </form>
</body>
</html>
