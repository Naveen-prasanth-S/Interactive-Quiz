<!DOCTYPE html>
<html>
<head>
  <title>Quiz Results - MindMaze</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #3b0a32;
      color: white;
    }
    .section-title {
      color: #ffc107;
      font-weight: bold;
    }
    .result-card {
      background-color: #521748;
      color: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
    .progress {
      height: 25px;
      border-radius: 1rem;
      background-color: #3b0a32;
    }
    .progress-bar {
      font-weight: bold;
    }
    footer {
      background-color: #26021b;
      color: white;
      padding: 20px 0;
    }
    footer a {
      color: #ffc107;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
        .profile-pic {
      height: 40px;
      width: 40px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-success fixed-top">
    <div class="container-fluid">

      <!-- Left: Toggle Button + Brand -->
      <div class="d-flex align-items-center">
        <button class="navbar-toggler me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="img.png" alt="Logo" style="height: 40px;" class="me-2">
        </a>
      </div>

      <!-- Right: Profile Picture -->
      <img src="profile.jpg" alt="Profile" class="profile-pic">
    </div>

    <!-- Offcanvas Content (Left Side) -->
    <div class="offcanvas offcanvas-start text-bg-success" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="browse.html">Browse Quizzes</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="join.html">Join Quiz</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="myquizzes.html">My Quizzes</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="results.html">Results</a></li>
        </ul>
        <div class="mt-3">
          <a class="btn btn-danger w-100" href="index.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div style="margin-top: 100px;"></div>

  <div class="container mt-5 pt-4">
    <h2 class="section-title mb-4">Your Quiz Results</h2>

    <!-- Python Basics -->
    <div class="result-card mb-4">
      <h5>Python Basics</h5>
      <p>Date: 06 July 2025</p>
      <div class="progress mt-2">
        <div class="progress-bar bg-warning" style="width: 80%;">8/10</div>
      </div>
    </div>

    <!-- General Knowledge -->
    <div class="result-card mb-4">
      <h5>General Knowledge</h5>
      <p>Date: 03 July 2025</p>
      <div class="progress mt-2">
        <div class="progress-bar bg-success" style="width: 100%;">10/10</div>
      </div>
    </div>

    <!-- Aptitude Test -->
    <div class="result-card mb-4">
      <h5>Aptitude Test</h5>
      <p>Date: 30 June 2025</p>
      <div class="progress mt-2">
        <div class="progress-bar bg-danger" style="width: 50%;">5/10</div>
      </div>
    </div>

  </div>

  <footer class="text-center mt-5">
    <div class="container">
      <p>&copy; 2025 MindMaze. All rights reserved.</p>
      <p>
        <a href="#">About</a> |
        <a href="#">Contact</a> |
        <a href="#">Privacy Policy</a>
      </p>
    </div>
  </footer>
</body>
</html>
