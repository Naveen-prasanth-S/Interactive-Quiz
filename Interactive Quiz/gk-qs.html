<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Only Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      overflow: hidden;
    }
    .quiz-wrapper {
      display: flex;
      transition: transform 0.8s ease-in-out;
      width: 1000vw;
      height: 100vh;
    }
    .slide {
      flex: 0 0 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .quiz-box {
      background: white;
      color: black;
      border-radius: 1rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
    .quiz-box h2 {
      margin-bottom: 1.5rem;
    }
    .option {
      display: block;
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      background: #f8f9fa;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }
    .option:hover {
      background: #dee2e6;
    }
    input[type="radio"] {
      display: none;
    }
    .start-screen {
      position: absolute;
      width: 100vw;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .start-screen a {
      background: #198754;
      color: white;
      padding: 1rem 2rem;
      border-radius: 10px;
      font-size: 1.5rem;
      text-decoration: none;
    }
    #start:target ~ .start-screen {
      display: none;
    }
    #start:target ~ .quiz-wrapper {
      transform: translateX(0);
    }
    /* Feedback styles for correct and incorrect answers */
    .quiz-wrapper input:checked + label {
      background: #dc3545 !important;
      color: white !important;
    }
    .quiz-wrapper input.correct:checked + label {
      background: #198754 !important;
    }
    /* Transitions remain the same for question navigation */
  </style>
</head>
<body>
  <div id="start"></div>
  <div class="start-screen">
    <a href="#start">Start Quiz</a>
  </div>
 <input type="radio" name="q1" id="q1a">
  <input type="radio" name="q1" id="q1b">
  <input type="radio" name="q1" id="q1c">
  <input type="radio" name="q1" id="q1d">
  <input type="radio" name="q2" id="q2a">
  <input type="radio" name="q2" id="q2b">
  <input type="radio" name="q2" id="q2c">
  <input type="radio" name="q2" id="q2d">
  <input type="radio" name="q3" id="q3a">
  <input type="radio" name="q3" id="q3b">
  <input type="radio" name="q3" id="q3c">
  <input type="radio" name="q3" id="q3d">
  <input type="radio" name="q4" id="q4a">
  <input type="radio" name="q4" id="q4b">
  <input type="radio" name="q4" id="q4c">
  <input type="radio" name="q4" id="q4d">
  <input type="radio" name="q5" id="q5a">
  <input type="radio" name="q5" id="q5b">
  <input type="radio" name="q5" id="q5c">
  <input type="radio" name="q5" id="q5d">
  <input type="radio" name="q6" id="q6a">
  <input type="radio" name="q6" id="q6b">
  <input type="radio" name="q6" id="q6c">
  <input type="radio" name="q6" id="q6d">
  <input type="radio" name="q7" id="q7a">
  <input type="radio" name="q7" id="q7b">
  <input type="radio" name="q7" id="q7c">
  <input type="radio" name="q7" id="q7d">
  <input type="radio" name="q8" id="q8a">
  <input type="radio" name="q8" id="q8b">
  <input type="radio" name="q8" id="q8c">
  <input type="radio" name="q8" id="q8d">
  <input type="radio" name="q9" id="q9a">
  <input type="radio" name="q9" id="q9b">
  <input type="radio" name="q9" id="q9c">
  <input type="radio" name="q9" id="q9d">
  <input type="radio" name="q10" id="q10a">

  <div class="quiz-wrapper">
    <div class="slide"><div class="quiz-box"><h2>1. Capital of France?</h2><label for="q1a" class="option">Berlin</label><label for="q1b" class="option">Rome</label><label for="q1c" class="option">Paris</label><label for="q1d" class="option">Madrid</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>2. Red Planet?</h2><label for="q2a" class="option">Venus</label><label for="q2b" class="option">Earth</label><label for="q2c" class="option">Mars</label><label for="q2d" class="option">Jupiter</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>3. Largest ocean?</h2><label for="q3a" class="option">Atlantic</label><label for="q3b" class="option">Indian</label><label for="q3c" class="option">Pacific</label><label for="q3d" class="option">Arctic</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>4. Fastest land animal?</h2><label for="q4a" class="option">Lion</label><label for="q4b" class="option">Tiger</label><label for="q4c" class="option">Cheetah</label><label for="q4d" class="option">Leopard</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>5. 2+2?</h2><label for="q5a" class="option">3</label><label for="q5b" class="option">4</label><label for="q5c" class="option">5</label><label for="q5d" class="option">6</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>6. Primary color?</h2><label for="q6a" class="option">Red</label><label for="q6b" class="option">Green</label><label for="q6c" class="option">Pink</label><label for="q6d" class="option">Black</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>7. Square root of 81?</h2><label for="q7a" class="option">8</label><label for="q7b" class="option">9</label><label for="q7c" class="option">10</label><label for="q7d" class="option">7</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>8. Water's chemical formula?</h2><label for="q8a" class="option">CO2</label><label for="q8b" class="option">H2O</label><label for="q8c" class="option">O2</label><label for="q8d" class="option">NaCl</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>9. Who painted Mona Lisa?</h2><label for="q9a" class="option">Van Gogh</label><label for="q9b" class="option">Picasso</label><label for="q9c" class="option">Da Vinci</label><label for="q9d" class="option">Michelangelo</label></div></div>
    <div class="slide"><div class="quiz-box"><h2>10. Largest mammal?</h2><label for="q10a" class="option">Elephant</label><label for="q10b" class="option">Blue Whale</label><label for="q10c" class="option">Giraffe</label><label for="q10d" class="option">Hippo</label></div></div>
  </div>
  <!-- Include radio buttons and full 10 questions with options in this section -->
  <!-- Each slide div should have .slide and .quiz-box structure with question and four .option labels -->
  <!-- Use input elements (hidden) for each option, assign one as correct with class 'correct' -->
</body>
</html>  <!-- Inputs for 10 questions (radio buttons) -->
