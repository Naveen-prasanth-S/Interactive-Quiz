<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Quiz | MindMaze</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #3b0a32;
      overflow-x: hidden;
    }

    .nav-link.active {
      font-weight: bold;
    }

    .join-section {
      margin-top: 120px;
      animation: fadeIn 1s ease-in-out;
    }

    .quiz-box {
      background-color: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(6px);
      border: 2px solid #ffffff33;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
      max-width: 700px;
      margin: auto;
      position: relative;
      z-index: 1;
    }

    input[type="text"]::placeholder {
      color: #999;
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .quote-box {
      margin-top: 30px;
      font-style: italic;
      color: #ffc;
      font-size: 1.1rem;
    }

    .bg-bubbles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-bubbles span {
      position: absolute;
      display: block;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: rise 25s linear infinite;
      bottom: -100px;
    }

    .bg-bubbles span:nth-child(1) { left: 10%; animation-duration: 20s; }
    .bg-bubbles span:nth-child(2) { left: 20%; animation-duration: 18s; }
    .bg-bubbles span:nth-child(3) { left: 30%; animation-duration: 22s; }
    .bg-bubbles span:nth-child(4) { left: 40%; animation-duration: 26s; }
    .bg-bubbles span:nth-child(5) { left: 50%; animation-duration: 19s; }

    @keyframes rise {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-1000px) scale(0.5); }
    }
        .profile-pic {
      height: 40px;
      width: 40px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>
<body>

  <div class="bg-bubbles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <nav class="navbar navbar-dark bg-success fixed-top">
    <div class="container-fluid">

      <!-- Left: Toggle Button + Brand -->
      <div class="d-flex align-items-center">
        <button class="navbar-toggler me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="img.png" alt="Logo" style="height: 40px;" class="me-2">
        </a>
      </div>

      <!-- Right: Profile Picture -->
      <img src="profile.jpg" alt="Profile" class="profile-pic">
    </div>

    <!-- Offcanvas Content (Left Side) -->
    <div class="offcanvas offcanvas-start text-bg-success" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="browse.html">Browse Quizzes</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="join.html">Join Quiz</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="myquizzes.html">My Quizzes</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="results.html">Results</a></li>
        </ul>
        <div class="mt-3">
          <a class="btn btn-danger w-100" href="index.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
        </div>
      </div>
    </div>
  </nav>


  <div class="container text-center join-section">
    <div class="quiz-box text-white">
      <h2 class="mb-4">Ready to Join a Quiz?</h2>
      <p class="mb-4 text-light">Enter your PIN code and challenge your brain!</p>

      <div class="d-flex justify-content-center gap-3 flex-wrap mb-3">
        <input type="text" class="form-control text-center fw-bold"
               placeholder="Enter PIN Code"
               style="border: 3px solid black; border-radius: 2rem; max-width: 250px;">
        <button class="btn btn-dark fw-bold px-4">Join Quiz</button>
      </div>
    </div>
  </div>

</body>
</html>
